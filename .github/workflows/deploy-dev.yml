name: Deploy DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trigger Render DEV Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEV_DEPLOY_HOOK }}"
