name: Deploy to Pantheon DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Checkout
        run: |
          echo "===== Repository Root ====="
          pwd
          ls -la

          echo "===== Config Directory ====="
          ls -la config | head -50

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p 2222 codeserver.dev.5c64571b-09a9-48f4-b65c-1fdeb6e8600f.drush.in >> ~/.ssh/known_hosts

      - name: Add Pantheon Remote
        run: |
          git remote remove pantheon || true
          git remote add pantheon ssh://codeserver.dev.5c64571b-09a9-48f4-b65c-1fdeb6e8600f@codeserver.dev.5c64571b-09a9-48f4-b65c-1fdeb6e8600f.drush.in:2222/~/repository.git
          git fetch pantheon

      - name: Show Pantheon Branches
        run: |
          git ls-remote --heads pantheon

      - name: Push Code to Pantheon
        run: |
          git push --force-with-lease pantheon HEAD:main

      - name: Show Commit
        run: |
          git rev-parse HEAD
          git ls-tree -r HEAD --name-only | grep '^config/' | head -20

      - name: Install Terminus
        run: |
          mkdir -p $HOME/bin
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar -o $HOME/bin/terminus
          chmod +x $HOME/bin/terminus
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Authenticate Terminus
        run: |
          terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Check Config Files In Pantheon Branches
        run: |
          rm -rf pantheon-check

          git clone \
            ssh://codeserver.dev.5c64571b-09a9-48f4-b65c-1fdeb6e8600f@codeserver.dev.5c64571b-09a9-48f4-b65c-1fdeb6e8600f.drush.in:2222/~/repository.git pantheon-check

          cd pantheon-check

          echo "=== MAIN ==="
          git checkout main
          ls config | head -20

          echo "=== MASTER ==="
          git checkout master
          ls config | head -20

      - name: Show Pantheon Main Commit
        run: |
          git ls-remote pantheon refs/heads/main

      - name: Show Pantheon Master Commit
        run: |
          git ls-remote pantheon refs/heads/master

      - name: Show Current Commit
        run: |
          git rev-parse HEAD

      - name: Verify Git Files on Pantheon
        run: |
          terminus drush enterprise-cms-dev.dev -- php:eval "
            echo shell_exec('git -C /code status');
            echo PHP_EOL;
            echo shell_exec('git -C /code ls-tree -r HEAD --name-only | grep ^config/ | head -20');
          "

      - name: Verify Git Repository on Pantheon
        run: |
          terminus connection:info enterprise-cms-dev.dev

          terminus drush enterprise-cms-dev.dev -- php:eval "
            echo 'Contents of /code:' . PHP_EOL;
            print_r(scandir('/code'));

            echo PHP_EOL;
            echo 'Contents of /code/config:' . PHP_EOL;
            print_r(scandir('/code/config'));
          "

      - name: Verify Config Directory on Pantheon
        run: |
          terminus drush enterprise-cms-dev.dev -- php:eval "
            echo 'Current Working Directory: ' . getcwd() . PHP_EOL;
            echo 'Drupal Root: ' . DRUPAL_ROOT . PHP_EOL;

            \$config = dirname(DRUPAL_ROOT) . '/config';

            echo 'Config Path: ' . \$config . PHP_EOL;
            echo 'Directory Exists: ';
            var_dump(is_dir(\$config));

            if (is_dir(\$config)) {
              \$files = scandir(\$config);

              echo 'Total Files: ' . count(\$files) . PHP_EOL;

              foreach (array_slice(\$files, 0, 20) as \$file) {
                echo \$file . PHP_EOL;
              }
            }
          "

      - name: Check Drupal Config Sync Directory
        run: |
          terminus drush enterprise-cms-dev.dev -- php:eval "
            echo 'config_sync_directory = ';
            var_dump(\Drupal::service('settings')->get('config_sync_directory'));
          "

      - name: Verify YAML Count
        run: |
          terminus drush enterprise-cms-dev.dev -- php:eval "
            \$dir = \Drupal::service('settings')->get('config_sync_directory');
            \$files = glob(\$dir . '/*.yml');

            echo 'YAML Files Found: ';
            var_dump(count(\$files));
          "

      - name: Check Active Git Commit
        run: |
          terminus drush enterprise-cms-dev.dev -- php:eval "
            echo 'HEAD: ' . trim(shell_exec('git -C /code rev-parse HEAD')) . PHP_EOL;
            echo 'Branch:' . PHP_EOL;
            passthru('git -C /code branch -a');
          "

      - name: Run Database Updates
        run: |
          terminus drush enterprise-cms-dev.dev -- updatedb -y

      - name: Import Drupal Configuration
        run: |
          terminus drush enterprise-cms-dev.dev -- config:import -y

      - name: Rebuild Drupal Cache
        run: |
          terminus drush enterprise-cms-dev.dev -- cache:rebuild
